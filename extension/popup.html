<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, sans-serif; padding: 16px; color: #1a1a1a; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .logo { width: 24px; height: 24px; background: #1a1a1a; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
    .preview { background: #f5f5f5; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .preview .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .preview .source { font-size: 11px; color: #888; margin-bottom: 8px; }
    .preview .content { font-size: 12px; color: #555; line-height: 1.5; max-height: 120px; overflow: hidden; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #1a1a1a; color: white; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .status { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
    .status.error { color: #e53e3e; }
    .status.success { color: #38a169; }
    .loading { text-align: center; padding: 20px; color: #888; font-size: 13px; }
    .settings-link { display: none; text-align: right; margin-bottom: 8px; }
    .settings-link a { font-size: 11px; color: #888; text-decoration: none; }
    .settings-link a:hover { color: #555; }
    .settings { display: none; }
    .settings label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 6px; }
    .settings input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: monospace; margin-bottom: 10px; }
    .settings input:focus { outline: none; border-color: #1a1a1a; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .btn-secondary { background: #f5f5f5; color: #555; }
    .btn-secondary:hover { background: #eee; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <h1>InfoFlow Clipper</h1>
  </div>

  <div class="settings-link" id="settingsLink"><a href="#">Settings</a></div>

  <div id="loading" class="loading">提取页面内容中...</div>

  <div id="main" style="display:none">
    <div class="preview">
      <div class="title" id="title"></div>
      <div class="source" id="source"></div>
      <div class="content" id="content"></div>
    </div>

    <button class="btn btn-primary" id="saveBtn">保存到 InfoFlow</button>
    <div class="status" id="status"></div>
  </div>

  <div id="settings" class="settings">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your API key here" />
    <div class="btn-row">
      <button class="btn btn-primary" id="saveKeyBtn">Save</button>
      <button class="btn btn-secondary" id="cancelKeyBtn">Cancel</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
